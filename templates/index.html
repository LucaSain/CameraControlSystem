<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laser Profiler Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #121212; color: #e0e0e0; }
        .card { background-color: #1e1e1e; border: 1px solid #333; margin-bottom: 20px; }
        .stat-value { font-size: 2em; font-weight: bold; color: #00d2ff; }
        .stat-label { font-size: 0.9em; color: #aaa; }
        .cam-feed { width: 100%; border-radius: 8px; border: 2px solid #333; }
        .btn-mode { width: 100%; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="container-fluid p-4">
        <div class="row mb-3">
            <div class="col-md-6">
                <h2>Laser Profiler Control</h2>
            </div>
            <div class="col-md-6 text-end">
                <button class="btn btn-outline-primary" onclick="setMode('trigger')">Trigger Mode</button>
                <button class="btn btn-outline-secondary" onclick="setMode('continuous')">Continuous Mode</button>
                <button class="btn btn-success ms-2" data-bs-toggle="modal" data-bs-target="#downloadModal">Download CSV</button>
            </div>
        </div>

        <div class="row">
            <div class="col-lg-6">
                <div class="card p-2">
                    <img src="mjpeg_stream" class="cam-feed" alt="Live Stream">
                </div>
            </div>

            <div class="col-lg-6">
                <div class="row">
                    <div class="col-6 text-center">
                        <div class="card p-3">
                            <div class="stat-label">Centroid X</div>
                            <div class="stat-value" id="val-cx">--</div>
                        </div>
                    </div>
                    <div class="col-6 text-center">
                        <div class="card p-3">
                            <div class="stat-label">Centroid Y</div>
                            <div class="stat-value" id="val-cy">--</div>
                        </div>
                    </div>
                </div>
                
                <div class="card p-3">
                    <h5 class="card-title">Centroid X (Time)</h5>
                    <canvas id="cxChart" height="120"></canvas>
                </div>

                <div class="card p-3">
                    <h5 class="card-title">Centroid Y (Time)</h5>
                    <canvas id="cyChart" height="120"></canvas>
                </div>
            
                <div class="card p-3">
                    <h5 class="card-title">Temperature Sensors (°C)</h5>
                    <canvas id="tempChart" height="180"></canvas>
                </div>
    
            </div>
        </div>

        <div class="row">
            <div class="col-12">
                <div class="card p-3">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <h5 class="card-title mb-0">Camera Properties</h5>
                        <div>
                            <span id="propMode" class="badge bg-secondary me-2">mode: --</span>
                            <button class="btn btn-sm btn-outline-info" onclick="loadProperties()">Refresh</button>
                        </div>
                    </div>
                    <div id="propStatus" class="small text-muted mb-2"></div>
                    <div id="propPanel" class="row g-3"></div>
                </div>
            </div>
        </div>

    </div>

    <div class="modal fade" id="downloadModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content" style="background-color: #1e1e1e; color: #fff;">
                <div class="modal-header" style="border-bottom: 1px solid #333;">
                    <h5 class="modal-title">Download Data</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="downloadForm">
                        <div class="mb-3">
                            <label for="fromDate" class="form-label">From:</label>
                            <input type="datetime-local" class="form-control" id="fromDate" required>
                        </div>
                        <div class="mb-3">
                            <label for="toDate" class="form-label">To:</label>
                            <input type="datetime-local" class="form-control" id="toDate" required>
                        </div>
                    </form>
                </div>
                <div class="modal-footer" style="border-top: 1px solid #333;">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-success" onclick="downloadCSV()">Download</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- CHARTS SETUP ---
        const commonOptions = {
            animation: false,
            responsive: true,
            scales: { x: { display: false }, y: { grid: { color: '#333' } } },
            elements: { point: { radius: 0 } }, 
            interaction: { mode: 'index', intersect: false }
        };

        // Chart for Centroid X
        const ctxCx = document.getElementById('cxChart').getContext('2d');
        const cxChart = new Chart(ctxCx, {
            type: 'line',
            data: { labels: [], datasets: [ { label: 'X', borderColor: '#ff6384', data: [], borderWidth: 2 } ] },
            options: commonOptions
        });

        // Chart for Centroid Y
        const ctxCy = document.getElementById('cyChart').getContext('2d');
        const cyChart = new Chart(ctxCy, {
            type: 'line',
            data: { labels: [], datasets: [ { label: 'Y', borderColor: '#36a2eb', data: [], borderWidth: 2 } ] },
            options: commonOptions
        });

        // Chart for Temperature
        const ctxTemp = document.getElementById('tempChart').getContext('2d');
        const tempChart = new Chart(ctxTemp, {
            type: 'line',
            data: { labels: [], datasets: [ { label: 'T1', borderColor: '#ff9f40', data: [] }, { label: 'T2', borderColor: '#ffcd56', data: [] }, { label: 'T3', borderColor: '#4bc0c0', data: [] }, { label: 'T4', borderColor: '#9966ff', data: [] } ] },
            options: commonOptions
        });

        // --- DATA FETCHING ---
        async function updateData() {
            try {
                const response = await fetch('api/latest_data');
                const data = await response.json();

                if (data.timestamps && data.timestamps.length > 0) {
                    const lastIdx = data.timestamps.length - 1;
                    document.getElementById('val-cx').innerText = data.cx[lastIdx];
                    document.getElementById('val-cy').innerText = data.cy[lastIdx];

                    // Update X Chart
                    cxChart.data.labels = data.timestamps;
                    cxChart.data.datasets[0].data = data.cx;
                    cxChart.update();

                    // Update Y Chart
                    cyChart.data.labels = data.timestamps;
                    cyChart.data.datasets[0].data = data.cy;
                    cyChart.update();

                    // Update Temp Chart
                    tempChart.data.labels = data.timestamps;
                    tempChart.data.datasets[0].data = data.temp1;
                    tempChart.data.datasets[1].data = data.temp2;
                    tempChart.data.datasets[2].data = data.temp3;
                    tempChart.data.datasets[3].data = data.temp4;
                    tempChart.update();
                }
            } catch (err) { console.error("Fetch error", err); }
        }

        async function setMode(mode) {
            try {
                await fetch(`api/set_mode?mode=${mode}`);
                alert(`Switched to ${mode} mode. Reloading...`);
                location.reload(); // Refresh the page
            } catch (err) {
                alert("Failed to switch mode");
            }
        }

        // --- DOWNLOAD LOGIC ---
        function initDownloadModal() {
            const now = new Date();
            // Subtract 1 hour (timezone aware)
            const oneHourAgo = new Date(now.getTime() - (60 * 60 * 1000));
            
            // Format for datetime-local input (YYYY-MM-DDTHH:mm)
            const format = (d) => {
                const pad = (n) => n < 10 ? '0' + n : n;
                return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
            };
            
            document.getElementById('toDate').value = format(now);
            document.getElementById('fromDate').value = format(oneHourAgo);
        }

        function downloadCSV() {
            const from = document.getElementById('fromDate').value;
            const to = document.getElementById('toDate').value;
            
            if (!from || !to) {
                alert("Please select both dates");
                return;
            }

            // Convert local inputs to URL format
            // We append :00 to seconds to match DB format usually
            const fromStr = from.replace('T', ' ') + ':00';
            const toStr = to.replace('T', ' ') + ':59'; // End of that minute
            
            window.location.href = `download?from=${encodeURIComponent(fromStr)}&to=${encodeURIComponent(toStr)}`;
            
            // Close modal
            const modalEl = document.getElementById('downloadModal');
            const modal = bootstrap.Modal.getInstance(modalEl);
            modal.hide();

            setTimeout(() => {
                location.reload();
            }, 2000);
        }

        // Initialize modal defaults when opened
        document.getElementById('downloadModal').addEventListener('show.bs.modal', initDownloadModal);

        // --- CAMERA PROPERTY KNOBS ---
        async function loadProperties() {
            const panel = document.getElementById('propPanel');
            const status = document.getElementById('propStatus');
            status.textContent = 'Loading...';
            try {
                const res = await fetch('api/properties');
                const data = await res.json();
                if (!res.ok) {
                    status.textContent = data.error || 'Camera not available';
                    panel.innerHTML = '';
                    return;
                }
                document.getElementById('propMode').textContent =
                    'mode: ' + (data.trigger_mode ? 'trigger' : 'continuous');
                renderProperties(data.properties || []);
                status.textContent = (data.properties || []).length + ' properties';
            } catch (err) {
                status.textContent = 'Failed to load properties';
                console.error(err);
            }
        }

        function renderProperties(props) {
            const panel = document.getElementById('propPanel');
            panel.innerHTML = '';
            const groups = {};
            props.forEach(p => {
                const cat = p.category || 'Other';
                (groups[cat] = groups[cat] || []).push(p);
            });
            Object.keys(groups).sort().forEach(cat => {
                const header = document.createElement('div');
                header.className = 'col-12';
                header.innerHTML =
                    `<div class="text-info border-bottom border-secondary pb-1 mb-1"><strong>${cat}</strong></div>`;
                panel.appendChild(header);
                groups[cat].forEach(p => panel.appendChild(buildControl(p)));
            });
        }

        function buildControl(p) {
            const col = document.createElement('div');
            col.className = 'col-md-4 col-lg-3';
            const wrap = document.createElement('div');
            wrap.className = 'p-2 border border-secondary rounded h-100';

            const disabled = (p.available === false) || (p.locked === true) || !!p.error;

            const label = document.createElement('label');
            label.className = 'form-label small mb-1 d-block';
            let labelText = p.display_name || p.name;
            if (p.unit) labelText += ` (${p.unit})`;
            label.textContent = labelText;
            if (disabled) {
                const badge = document.createElement('span');
                badge.className = 'badge bg-secondary ms-1';
                badge.textContent = p.error ? 'n/a' : (p.locked ? 'locked' : 'unavail');
                label.appendChild(badge);
            }
            wrap.appendChild(label);

            const type = p.type;
            let control;
            let hint = null;

            if (type === 'enum') {
                control = document.createElement('select');
                control.className = 'form-select form-select-sm';
                (p.options || []).forEach(opt => {
                    const o = document.createElement('option');
                    o.value = opt; o.textContent = opt;
                    if (opt === p.value) o.selected = true;
                    control.appendChild(o);
                });
                control.addEventListener('change', () => setProperty(p.name, control.value));
            } else if (type === 'bool') {
                const sw = document.createElement('div');
                sw.className = 'form-check form-switch';
                control = document.createElement('input');
                control.className = 'form-check-input';
                control.type = 'checkbox';
                control.checked = !!p.value;
                control.disabled = disabled;
                control.addEventListener('change', () => setProperty(p.name, control.checked));
                sw.appendChild(control);
                wrap.appendChild(sw);
                col.appendChild(wrap);
                return col;
            } else if (type === 'int' || type === 'float') {
                control = document.createElement('input');
                control.type = 'number';
                control.className = 'form-control form-control-sm';
                if (p.min !== undefined) control.min = p.min;
                if (p.max !== undefined) control.max = p.max;
                if (p.step !== undefined) control.step = p.step;
                else if (type === 'float') control.step = 'any';
                control.value = p.value;
                const commit = () => setProperty(p.name, control.value);
                control.addEventListener('change', commit);
                control.addEventListener('keydown', e => { if (e.key === 'Enter') commit(); });
                if (p.min !== undefined && p.max !== undefined) {
                    hint = document.createElement('div');
                    hint.className = 'small text-muted mt-1';
                    hint.textContent = `${p.min} – ${p.max}`;
                }
            } else if (type === 'command') {
                control = document.createElement('button');
                control.className = 'btn btn-sm btn-outline-warning';
                control.textContent = 'Execute';
                control.addEventListener('click', () => runCommand(p.name));
            } else {
                control = document.createElement('input');
                control.type = 'text';
                control.className = 'form-control form-control-sm';
                control.value = (p.value === null || p.value === undefined) ? '' : p.value;
                control.addEventListener('change', () => setProperty(p.name, control.value));
            }

            control.disabled = disabled;
            wrap.appendChild(control);
            if (hint) wrap.appendChild(hint);
            col.appendChild(wrap);
            return col;
        }

        async function setProperty(name, value) {
            const status = document.getElementById('propStatus');
            try {
                const res = await fetch('api/property', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, value })
                });
                const data = await res.json();
                status.textContent = (res.ok && data.status === 'success')
                    ? `${name} = ${data.value}`
                    : `Failed: ${name} (${data.error || 'rejected'})`;
            } catch (err) {
                status.textContent = `Error setting ${name}`;
            }
            // One change can lock/unlock others (e.g. ExposureAuto -> ExposureTime),
            // so re-read the full set to refresh control states.
            setTimeout(loadProperties, 250);
        }

        async function runCommand(name) {
            const status = document.getElementById('propStatus');
            try {
                const res = await fetch('api/command', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name })
                });
                const data = await res.json();
                status.textContent = (res.ok && data.status === 'success')
                    ? `${name} executed`
                    : `Failed: ${name} (${data.error || ''})`;
            } catch (err) {
                status.textContent = `Error running ${name}`;
            }
        }

        setInterval(updateData, 1000);
        updateData();
        loadProperties();
    </script>
</body>
</html>
